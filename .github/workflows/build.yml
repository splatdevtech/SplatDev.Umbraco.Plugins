name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore SplatDev.Publishable.slnf

      - name: Build
        run: dotnet build SplatDev.Publishable.slnf --no-restore -c Release

      - name: Test
        run: dotnet test SplatDev.Publishable.slnf --no-build -c Release --verbosity normal


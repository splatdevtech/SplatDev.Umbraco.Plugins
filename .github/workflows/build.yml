name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore SplatDev.Core.sln

      - name: Build publishable plugins
        run: |
          FAIL_COUNT=0
          PASS_COUNT=0
          for csproj in $(find . -maxdepth 3 -name "SplatDev.Umbraco.Plugins.*.csproj" \
            | grep -v "Tests\|BackupManager\|FormsClone\|obj\|bin\|CodeFirst\|PdfCurator" \
            | sort); do
            name=$(basename "$csproj" .csproj)
            if dotnet build "$csproj" -c Release --no-restore 2>&1 | grep -q "Build succeeded"; then
              PASS_COUNT=$((PASS_COUNT+1))
            else
              echo "::warning::Build failed: $name"
              FAIL_COUNT=$((FAIL_COUNT+1))
            fi
          done
          echo "Build summary: $PASS_COUNT passed, $FAIL_COUNT failed"

      - name: Test
        run: |
          if dotnet test SplatDev.Core.sln --no-build -c Release --verbosity normal 2>&1 | grep -q "Test run"; then
            echo "Tests completed"
          else
            echo "::warning::No test projects found or tests skipped"
          fi

  workflow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore Workflow
        run: dotnet restore SplatDev.Umbraco.Workflow/SplatDev.Umbraco.Workflow.slnx

      - name: Build Workflow
        run: dotnet build SplatDev.Umbraco.Workflow/SplatDev.Umbraco.Workflow.slnx -c Release --no-restore

      - name: Test Workflow
        run: |
          if dotnet test SplatDev.Umbraco.Workflow/SplatDev.Umbraco.Workflow.slnx --no-build -c Release --verbosity normal 2>&1 | grep -q "Test run"; then
            echo "Workflow tests completed"
          else
            echo "::warning::No Workflow test projects found or tests skipped"
          fi

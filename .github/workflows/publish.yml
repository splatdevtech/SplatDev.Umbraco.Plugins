name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: |
          dotnet restore SplatDev.Core.sln
          dotnet restore SplatDev.Umbraco.Plugins.D4Sign/SplatDev.Umbraco.Plugins.D4Sign.csproj
          dotnet restore SplatDev.Umbraco.Plugins.ENotAssina/SplatDev.Umbraco.Plugins.ENotAssina.csproj
          dotnet restore "SplatDev.Umbraco.Plugins.Yaml/SplatDev.Umbraco.Plugins.Schema2Yaml/SplatDev.Umbraco.Plugins.Schema2Yaml.csproj"
          dotnet restore "SplatDev.Umbraco.Plugins.Yaml/SplatDev.Umbraco.Plugins.Yaml2Schema/SplatDev.Umbraco.Plugins.Yaml2Schema.csproj"

      - name: Build & Pack publishable plugins
        run: |
          mkdir -p ./nupkgs
          FAIL=()
          PASS=()
          for csproj in $(find . -maxdepth 3 -name "SplatDev.Umbraco.Plugins.*.csproj" \
            | grep -v "Tests\|BackupManager\|FormsClone\|obj\|bin\|CodeFirst\|PdfCurator" \
            | sort); do
            name=$(basename "$csproj" .csproj)
            echo "--- Building $name ---"
            if dotnet build "$csproj" -c Release --no-restore 2>&1 | grep -q "Build succeeded"; then
              dotnet pack "$csproj" --no-build -c Release -o ./nupkgs
              PASS+=("$name")
            else
              echo "::warning::Skipping $name (build failed)"
              FAIL+=("$name")
            fi
          done
          echo ""
          echo "=== Pack Summary ==="
          echo "Packed (${#PASS[@]}): ${PASS[*]}"
          if [ ${#FAIL[@]} -gt 0 ]; then
            echo "Skipped (${#FAIL[@]}): ${FAIL[*]}"
          fi

      - name: List packages
        run: ls -la ./nupkgs/*.nupkg 2>/dev/null || echo "No packages generated"

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          PUSHED=()
          SKIPPED=()
          FAILED=()
          for pkg in ./nupkgs/*.nupkg; do
            filename=$(basename "$pkg" .nupkg)
            # PackageId ends at the first dot-then-digit boundary; version is the rest
            pkgid=$(echo "$filename" | sed -E 's/\.[0-9].*//')
            pkgver="${filename#${pkgid}.}"
            pkgid_lower=$(echo "$pkgid" | tr '[:upper:]' '[:lower:]')
            # Check if version already exists on NuGet.org (avoid 409 rate-limit hits)
            nuget_url="https://api.nuget.org/v3-flatcontainer/${pkgid_lower}/index.json"
            existing=$(curl -sf "$nuget_url" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('yes' if '${pkgver}' in d.get('versions',[]) else 'no')" 2>/dev/null || echo "no")
            if [ "$existing" = "yes" ]; then
              echo "Skipping $filename (already on NuGet.org)"
              SKIPPED+=("$filename")
              continue
            fi
            echo "Pushing $filename..."
            for attempt in 1 2 3; do
              if dotnet nuget push "$pkg" \
                  --api-key "$NUGET_API_KEY" \
                  --source https://api.nuget.org/v3/index.json \
                  --skip-duplicate \
                  --no-symbols; then
                PUSHED+=("$filename")
                break
              elif [ $attempt -lt 3 ]; then
                echo "::warning::Push attempt $attempt failed for $filename, retrying in 10s..."
                sleep 10
              else
                echo "::error::Push failed for $filename after 3 attempts"
                FAILED+=("$filename")
              fi
            done
          done
          echo ""
          echo "=== NuGet Push Summary ==="
          echo "Pushed  (${#PUSHED[@]}): ${PUSHED[*]:-none}"
          echo "Skipped (${#SKIPPED[@]}): ${SKIPPED[*]:-none}"
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "Failed  (${#FAILED[@]}): ${FAILED[*]}"
            exit 1
          fi

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            echo "Pushing $pkg to GitHub Packages..."
            dotnet nuget push "$pkg" \
              --api-key "$GITHUB_TOKEN" \
              --source https://nuget.pkg.github.com/SplatDev-Ltda/index.json \
              --skip-duplicate \
              --no-symbols \
              || echo "::warning::GitHub Packages push failed for $pkg (may need org config)"
          done

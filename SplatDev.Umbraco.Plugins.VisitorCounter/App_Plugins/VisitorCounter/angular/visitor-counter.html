<div ng-controller="VisitorCounter.DashboardController as vm">
    <umb-box>
        <umb-box-header title="Visitor Counter"></umb-box-header>
        <umb-box-content>
            <div ng-if="vm.error" class="alert alert-danger">{{vm.error}}</div>

            <div ng-if="vm.loading">
                <umb-load-indicator></umb-load-indicator>
            </div>

            <div ng-if="!vm.loading && vm.stats" class="visitor-stats">
                <div class="visitor-stat">
                    <span class="stat-value">{{vm.stats.totalVisits | number}}</span>
                    <span class="stat-label">Total Visits (all time)</span>
                </div>
                <div class="visitor-stat">
                    <span class="stat-value">{{vm.stats.uniqueVisits | number}}</span>
                    <span class="stat-label">Unique Visitors (last {{vm.stats.periodDays}} days)</span>
                </div>
            </div>

            <table ng-if="!vm.loading && vm.dailyCounts.length" class="table" style="margin-top:16px">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Total Visits</th>
                        <th>Unique Visitors</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="day in vm.dailyCounts | orderBy: 'date':true">
                        <td>{{day.date}}</td>
                        <td>{{day.totalVisits | number}}</td>
                        <td>{{day.uniqueVisits | number}}</td>
                    </tr>
                </tbody>
            </table>

            <p ng-if="!vm.loading && !vm.dailyCounts.length">No visitor data recorded yet.</p>

            <button class="btn btn-primary" style="margin-top:12px" ng-click="vm.load()" ng-disabled="vm.loading">Refresh</button>
        </umb-box-content>
    </umb-box>

    <style>
        .visitor-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
        .visitor-stat { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 16px 24px; text-align: center; min-width: 160px; }
        .stat-value { display: block; font-size: 2rem; font-weight: 700; }
        .stat-label { display: block; font-size: 0.8rem; color: #6c757d; margin-top: 4px; }
    </style>
</div>

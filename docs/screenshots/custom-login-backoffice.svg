<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="sidebarBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B2E"/>
      <stop offset="100%" style="stop-color:#16172B"/>
    </linearGradient>
    <clipPath id="rounded"><rect width="1280" height="800" rx="8"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Browser chrome -->
    <rect width="1280" height="800" fill="#1A1B2E"/>

    <!-- Top bar -->
    <rect width="1280" height="48" fill="#14152A"/>
    <circle cx="24" cy="24" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="24" r="6" fill="#FEBC2E"/>
    <circle cx="64" cy="24" r="6" fill="#28C840"/>
    <rect x="90" y="12" width="500" height="24" rx="12" fill="#1E2036"/>
    <text x="340" y="28" font-family="Inter, sans-serif" font-size="11" fill="#6D7090" text-anchor="middle">localhost:5001/umbraco#/custom-login</text>

    <!-- Sidebar -->
    <rect x="0" y="48" width="220" height="752" fill="url(#sidebarBg)"/>
    <rect x="0" y="48" width="220" height="1" fill="#2B2D42"/>

    <!-- Umbraco logo area -->
    <text x="24" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#4ECDC4">Umbraco</text>

    <text x="42" y="83" font-family="Inter, sans-serif" font-size="13" fill="#6D7090">Content</text><text x="42" y="121" font-family="Inter, sans-serif" font-size="13" fill="#6D7090">Media</text><rect x="0" y="136" width="220" height="36" rx="0" fill="#2B2D42"/><rect x="0" y="136" width="3" height="36" fill="#4ECDC4"/><text x="42" y="159" font-family="Inter, sans-serif" font-size="13" fill="#E0E2F0">Settings</text><text x="42" y="197" font-family="Inter, sans-serif" font-size="13" fill="#6D7090">Members</text><text x="42" y="235" font-family="Inter, sans-serif" font-size="13" fill="#6D7090">Forms</text><text x="42" y="273" font-family="Inter, sans-serif" font-size="13" fill="#6D7090">Packages</text>

    <!-- Main content area -->
    <rect x="220" y="48" width="1060" height="752" fill="#1E2036"/>
    <rect x="220" y="48" width="1060" height="1" fill="#2B2D42"/>

    <!-- Page header -->
    <text x="252" y="82" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#E0E2F0">Custom Login</text>
    <text x="252" y="86" font-family="Inter, sans-serif" font-size="0" fill="#8D90A8">Custom login page configuration</text>

    <!-- Panels -->
    
    <text x="252" y="90" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#E0E2F0">Login Page Settings</text>
    <text x="252" y="124" font-family="Inter, sans-serif" font-size="11" fill="#8D90A8">Background Image</text>
    <rect x="412" y="110" width="400" height="24" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
    <text x="422" y="126" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">/media/login-bg.jpg</text>
    <text x="252" y="158" font-family="Inter, sans-serif" font-size="11" fill="#8D90A8">Logo URL</text>
    <rect x="412" y="144" width="400" height="24" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
    <text x="422" y="160" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">/media/logo.png</text>
    <text x="252" y="192" font-family="Inter, sans-serif" font-size="11" fill="#8D90A8">Title</text>
    <rect x="412" y="178" width="400" height="24" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
    <text x="422" y="194" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">Welcome to Our Portal</text>
    <text x="252" y="226" font-family="Inter, sans-serif" font-size="11" fill="#8D90A8">Enable Social Login</text>
    <rect x="412" y="212" width="400" height="24" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
    <text x="422" y="228" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">Yes</text>
    <text x="252" y="260" font-family="Inter, sans-serif" font-size="11" fill="#8D90A8">Remember Me</text>
    <rect x="412" y="246" width="400" height="24" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
    <text x="422" y="262" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">Enabled</text>

    <!-- Actions -->
    
      <rect x="252" y="288" width="110" height="30" rx="4" fill="#4ECDC4" stroke="#4ECDC4" stroke-width="1"/>
      <text x="307" y="307" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1A1B2E" text-anchor="middle">Preview</text>
      <rect x="372" y="288" width="110" height="30" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
      <text x="427" y="307" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#C0C4D8" text-anchor="middle">Save</text>

    <!-- Watermark -->
    <text x="1264" y="790" font-family="Inter, sans-serif" font-size="9" fill="#3D3F5A" text-anchor="end">SplatDev.Umbraco.Plugins</text>
  </g>
</svg>
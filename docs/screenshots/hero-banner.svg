<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1724"/>
      <stop offset="50%" style="stop-color:#1B2A3B"/>
      <stop offset="100%" style="stop-color:#0F2032"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#45B7AF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#4ECDC4" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="300" r="60" fill="none" stroke="#4ECDC4" stroke-width="1" opacity="0.08"/>
  <circle cx="100" cy="300" r="90" fill="none" stroke="#4ECDC4" stroke-width="1" opacity="0.04"/>
  <circle cx="1100" cy="100" r="70" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.06"/>
  <circle cx="1100" cy="100" r="100" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.03"/>

  <!-- Title -->
  <text x="600" y="110" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">
    SplatDev Umbraco Plugins
  </text>

  <!-- Subtitle -->
  <text x="600" y="148" font-family="Inter, sans-serif" font-size="18" fill="#6A8BA4" text-anchor="middle">
    120+ plugins, themes, and extensions for Umbraco 13 and 17
  </text>

  <!-- Accent line -->
  <rect x="500" y="168" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Plugin category cards -->
  <g font-family="Inter, sans-serif">
    <!-- Blog -->
    <rect x="60" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="140" y="232" font-size="12" font-weight="600" fill="#4ECDC4" text-anchor="middle">Blog Engine</text>
    <text x="140" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">Posts, Categories, RSS</text>
    <text x="140" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Comments, Archives</text>

    <!-- Backups -->
    <rect x="240" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="320" y="232" font-size="12" font-weight="600" fill="#FF6B6B" text-anchor="middle">Backups</text>
    <text x="320" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">10+ Cloud Providers</text>
    <text x="320" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Schedule, Restore</text>

    <!-- Analytics -->
    <rect x="420" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="500" y="232" font-size="12" font-weight="600" fill="#FFD700" text-anchor="middle">Analytics</text>
    <text x="500" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">Page Views, Visitors</text>
    <text x="500" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Dashboards, Charts</text>

    <!-- SEO -->
    <rect x="600" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="680" y="232" font-size="12" font-weight="600" fill="#A8D8A8" text-anchor="middle">SEO Tools</text>
    <text x="680" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">Meta Audit, Sitemap</text>
    <text x="680" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Robots.txt, Scoring</text>

    <!-- Security -->
    <rect x="780" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="860" y="232" font-size="12" font-weight="600" fill="#FF8E53" text-anchor="middle">Security</text>
    <text x="860" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">2FA, OAuth, LDAP</text>
    <text x="860" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Custom Login, GDPR</text>

    <!-- Themes -->
    <rect x="960" y="200" width="160" height="80" rx="8" fill="#1E3048" stroke="#2A4060" stroke-width="1"/>
    <text x="1040" y="232" font-size="12" font-weight="600" fill="#C8A2E8" text-anchor="middle">Themes</text>
    <text x="1040" y="252" font-size="10" fill="#6A8BA4" text-anchor="middle">Blog, Commerce, Hotel</text>
    <text x="1040" y="268" font-size="10" fill="#6A8BA4" text-anchor="middle">Portfolio, Corporate</text>
  </g>

  <!-- Version badges -->
  <g font-family="Inter, sans-serif" font-size="11">
    <rect x="440" y="310" width="100" height="24" rx="12" fill="#162538" stroke="#2A4060" stroke-width="1"/>
    <text x="490" y="326" fill="#4ECDC4" text-anchor="middle" font-weight="600">Umbraco 13</text>
    <rect x="556" y="310" width="100" height="24" rx="12" fill="#162538" stroke="#2A4060" stroke-width="1"/>
    <text x="606" y="326" fill="#FF6B6B" text-anchor="middle" font-weight="600">Umbraco 17</text>
    <rect x="672" y="310" width="100" height="24" rx="12" fill="#162538" stroke="#2A4060" stroke-width="1"/>
    <text x="722" y="326" fill="#FFD700" text-anchor="middle" font-weight="600">.NET 8 / 10</text>
  </g>

  <!-- Footer -->
  <text x="600" y="370" font-family="Inter, sans-serif" font-size="12" fill="#3D5670" text-anchor="middle">
    MIT License | NuGet.org | SplatDev Ltda
  </text>
</svg>

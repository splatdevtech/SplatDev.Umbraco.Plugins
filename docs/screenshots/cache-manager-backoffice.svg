<text x="264" y="329" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">Runtime Cache</text><text x="511" y="329" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">289</text><text x="758" y="329" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">89.3%</text><text x="1005" y="329" font-family="Inter, sans-serif" font-size="11" fill="#C0C4D8">7 MB</text>

    <!-- Actions -->
    
      <rect x="252" y="354" width="110" height="30" rx="4" fill="#4ECDC4" stroke="#4ECDC4" stroke-width="1"/>

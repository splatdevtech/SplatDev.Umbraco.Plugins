      <rect x="492" y="354" width="110" height="30" rx="4" fill="#2B2D42" stroke="#3D3F5A" stroke-width="1"/>
      <text x="547" y="373" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#C0C4D8" text-anchor="middle">Settings</text>


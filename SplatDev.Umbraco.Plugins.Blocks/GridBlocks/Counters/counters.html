<style>
    @import '/css/all.min.css';
    @import '/css/bootstrap.min.css';

    .counters .counter {
        text-align: center;
    }

    .counters.custom-counters [class*="fa-"] {
        display: block;
        font-size: 28px;
        margin-bottom: 15px;
    }

    .text-color-secondary, .text-secondary {
        color: #fff !important;
    }

    .counters.custom-counters strong {
        font-weight: normal;
        font-size: 26px;
        letter-spacing: 2px;
        line-height: 40px;
    }

    .text-color-light, .text-light {
        color: #FFF !important;
        font-weight: 900;
    }

    .counters.custom-counters label {
        font-size: 14px;
        line-height: 14px;
        display: block;
        font-weight: 100;
        color: #f2f2f2;
    }
</style>
<section class="counters-section section section-transparent section-no-border custom-z-index m-0">
    <div class="container">
        <div class="row counters custom-counters">
            <div class="col-lg-3 col-sm-6" ng-repeat="item in block.data.list.contentData">
                <div class="counter">
                    <i class="text-color-secondary" ng-class="'fa-' + item.icon.split(' ')[0] + ' fa-' + item.icon.split(' ')[1]"></i>
                    <strong class="text-color-light" data-to="{{item.number}}" data-append="+">{{item.number}}+</strong>
                    <label>{{item.title}}</label>
                </div>
            </div>
        </div>
    </div>
</section>

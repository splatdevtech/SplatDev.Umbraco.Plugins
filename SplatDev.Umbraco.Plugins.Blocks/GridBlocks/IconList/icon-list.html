<div class="icon-list" ng-controller="splatDev.IconList.Controller">
    <div class="row pb-3">
        <div class="col-lg-10 col-md-10 col-sm-12 offset-lg-1 offset-md-1 offset-sm-0">
            <div class="row icon-list-behavior-{{block.data.direction}}">
                <div ng-class="direction" ng-repeat="item in iconList">
                    <div class="feature-box feature-box-style-2">
                        <div class="feature-box-icon">
                            <i ng-if="item.icon" class="fa-{{item.icon.split(' ')[0]}} fa-{{item.icon.split(' ')[1]}} text-color-primary"></i>
                        </div>
                        <div class="feature-box-info">
                            <h4 ng-bind-html="item.title"></h4>
                            <p class="mb-4" ng-bind-html="item.description"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

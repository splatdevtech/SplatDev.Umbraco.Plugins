<style>

    @media (min-width: 1200px) {
        .callout-section .container {
            max-width: 1140px;
        }
    }

    @media (min-width: 992px) {
        .callout-section .container {
            max-width: 960px;
        }
    }

    @media (min-width: 768px) {
        .callout-section .container {
            max-width: 720px;
        }
    }

    @media (min-width: 576px) {
        .callout-section .container {
            max-width: 540px;
        }
    }

    .callout-section a {
        color: #fff;
        text-decoration: none;
    }

    .callout-section .row {
        display: -ms-flexbox;
        display: flex;
        -ms-flex-wrap: wrap;
        flex-wrap: wrap;
        margin-right: -15px;
        margin-left: -15px;
    }

    .callout-section .col-lg-8 {
        position: relative;
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        -ms-flex: 0 0 66.666667%;
        flex: 0 0 66.666667%;
        max-width: 66.666667%;
    }

    .callout-section .container {
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
    }

    .callout-section .bg-primary {
        background-color: transparent !important;
    }

    .callout-section .home-intro {
        background-color: #212529;
        margin-bottom: 60px;
        overflow: hidden;
        padding: 38.4px 0;
        padding: 2.4rem 0;
        position: relative;
        text-align: left;
    }

        .callout-section .home-intro p {
            color: #000;
            display: inline-block;
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 0;
        }

            .callout-section .home-intro p .highlighted-word {
                font-family: "Shadows Into Light", cursive;
                font-weight: 500;
                font-size: 1.6em;
            }

                .callout-section .home-intro p .highlighted-word:before {
                    content: ' ';
                    display: inline-block;
                }

            .callout-section .home-intro p .opacity07 {
                color: #FFF;
                display: block;
                font-size: 0.8em;
                font-weight: 300;
                padding-top: 5px;
                opacity: 0.7;
            }

        .callout-section .home-intro .btn {
            display: inline-block;
            font-weight: 400;
            color: #212529;
            text-align: center;
            vertical-align: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: transparent;
            border: 1px solid transparent;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .callout-section .home-intro .btn-dark {
            background-color: #212529;
            border-color: #212529 #212529 #0a0c0d;
            color: #FFF;
        }

        .callout-section .home-intro .get-started {
            position: relative;
        }

    .callout-section .align-items-center {
        -ms-flex-align: center !important;
        align-items: center !important;
    }

</style>
<div class="callout-section">
    <div class="home-intro bg-primary">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-8 text-color-select" ng-bind-html="block.data.calloutContent.markup"></div>
                <div class="col-lg-4">
                    <div class="get-started text-left text-lg-right">
                        <a href="#" class="btn btn-dark btn-lg text-3 font-weight-semibold px-4 py-3" title="will browse to {{block.data.calloutButton[0].url}}" ng-if="block.data.calloutButton.length>0">{{block.data.calloutButton[0].name}}</a>
                        <div class="learn-more" ng-if="block.data.calloutLearnMore.length>0">or <a href="#" title="Will browse to {{block.data.calloutLearnMore[0].url}}">{{block.data.calloutLearnMore[0].name}}</a></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

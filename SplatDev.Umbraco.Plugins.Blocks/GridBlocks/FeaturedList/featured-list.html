<div class="featured-list" ng-controller="splatDev.FeaturedList.Controller">
    <div class="row pb-3">
        <div class="col-lg-8">
            <h2 class="font-weight-normal text-7" ng-bind-html="featuredList.title"></h2>
            <div class="row">
                <div class="col-sm-6" ng-repeat="item in featuredList.arrayList">
                    <div class="feature-box feature-box-style-2">
                        <div class="feature-box-icon">
                            <i ng-if="item.icon !== undefined && item.icon.length===2 && item.img === undefined" class="icons fa-{{item.icon[0]}} fa-{{item.icon[1]}} text-color-primary"></i>
                            <img class="text-color-primary" ng-if="item.img !== undefined && item.icon === undefined" ng-src="{{(item.img | mediaItemResolver).mediaLink}}?width=32&height=32" />
                        </div>
                        <div class="feature-box-info">
                            <h4 class="font-weight-bold text-4 mb-0">{{item.title}}</h4>
                            <p class="mb-4">{{item.summary}}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <h2 class="font-weight-normal text-6" ng-bind-html="featuredList.sibeBarTitle"></h2>

            <div class="accordion accordion-modern" id="accordion">
                <div class="card card-default" ng-repeat="item in featuredList.arrayBoxes track by $index">
                    <div class="card-header">
                        <h4 class="card-title m-0">
                            <a class="accordion-toggle text-color-dark font-weight-bold" data-toggle="collapse" data-parent="#accordion" href="#collapse{{$index}}">
                                <i class="icons fa-{{item.icon[0]}} fa-{{item.icon[1]}} text-color-primary"></i>
                                {{item.title}}
                            </a>
                        </h4>
                    </div>
                    <div id="collapse{{$index}}" class="collapse {{$index===0?'show':''}}">
                        <div class="card-body text-2">
                            <p ng-bind-html="item.text"></p>
                            <p class="mb-0" ng-repeat="link in item.links">{{link.name}} <a ng-href="{{link.url}}" class="d-block text-color-dark font-weight-semibold pt-4">read more <i class="fas fa-angle-right position-relative top-1 ml-1"></i></a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

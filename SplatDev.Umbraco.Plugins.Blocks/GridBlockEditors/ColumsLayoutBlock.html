<section ng-style="{'opacity': block.settingsData.opacity,'background': 'no-repeat center/cover url(' + (block.settingsData.sectionBackgroundImage[0].mediaKey | mediaItemResolver).mediaLink + ')', 'background-attachment': (block.settingsData.sectionBackgroundImageParallax === '1' ? 'fixed':'inherit'), 'background-color': '#' + block.settingsData.sectionBackgroundColor.value}" class="padded-section {{block.settingsData.customCSSClass}} {{block.settingsData.sectionBackgroundColor.label.toLowerCase().replaceAll(' ','')}}">
    <umb-block-grid-render-area-slots ng-style="{'background': (block.settingsData.sectionBackgroundColor.value === '' ? 'transparent':block.settingsData.sectionBackgroundColor.value)};" data-bg="{{block.settingsData.sectionBackgroundColor.value}}"></umb-block-grid-render-area-slots>
</section>

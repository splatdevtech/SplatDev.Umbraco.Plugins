<div class="umb-dashboard" ng-controller="TweetsDashboardController">
    <div class="umb-panel-header">
        <h1>Tweets</h1>
        <p class="umb-panel-description">Twitter/X feed integration. Display tweets, configure API keys, and manage tweet display.</p>
    </div>
    <div class="umb-box">
        <div class="umb-box-header" style="display:flex;align-items:center;gap:12px;padding:16px;">
            <div style="width:48px;height:48px;border-radius:10px;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">🐦</div>
            <div>
                <h3 style="margin:0 0 4px;font-size:1rem;font-weight:600;">Tweets</h3>
                <p style="margin:0;font-size:0.875rem;color:#6b7280;">Plugin is installed and running on Umbraco 13.</p>
            </div>
            <span style="margin-left:auto;display:inline-block;padding:2px 8px;border-radius:9999px;font-size:0.7rem;font-weight:700;text-transform:uppercase;background:#d1fae5;color:#065f46;">Active</span>
        </div>
        <div class="umb-box-content" style="padding:16px;border-top:1px solid #e5e7eb;">
            <div ng-if="loading" class="umb-loading">Loading...</div>
            <div ng-if="message" class="alert alert-{{message.type}}" style="margin-bottom:12px;">{{message.text}}</div>
            <p style="color:#374151;">Twitter/X feed integration. Display tweets, configure API keys, and manage tweet display.</p>
            <div style="margin-top:16px;">
                <button class="btn btn-primary" ng-click="save()" ng-disabled="loading">
                    {{saved ? 'Saved!' : 'Save Settings'}}
                </button>
            </div>
        </div>
    </div>
</div>

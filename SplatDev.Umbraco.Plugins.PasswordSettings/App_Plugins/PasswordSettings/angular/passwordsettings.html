<div ng-controller="PasswordSettingsDashboardController" class="ps-dashboard">
    <div class="umb-box">
        <div class="umb-box-header">
            <h1>Password Settings</h1>
            <p>Configure password complexity rules, expiration and history enforcement.</p>
        </div>
        <div class="umb-box-content" ng-if="loading">
            <p>Loading policy...</p>
        </div>
        <div class="umb-box-content" ng-if="!loading && policy">
            <div class="ps-form">
                <div class="ps-field">
                    <label>Minimum Length</label>
                    <input type="number" ng-model="policy.minLength" min="4" max="128" class="ps-input" />
                </div>
                <div class="ps-field">
                    <label><input type="checkbox" ng-model="policy.requireUppercase" /> Require Uppercase</label>
                </div>
                <div class="ps-field">
                    <label><input type="checkbox" ng-model="policy.requireDigit" /> Require Digit</label>
                </div>
                <div class="ps-field">
                    <label><input type="checkbox" ng-model="policy.requireSpecial" /> Require Special Character</label>
                </div>
                <div class="ps-field">
                    <label>Expiration Days (0 = never)</label>
                    <input type="number" ng-model="policy.expirationDays" min="0" class="ps-input" />
                </div>
                <div class="ps-field">
                    <label>Password History Count</label>
                    <input type="number" ng-model="policy.historyCount" min="0" max="24" class="ps-input" />
                </div>
                <div class="ps-actions">
                    <button ng-click="savePolicy()" ng-disabled="saving" class="btn btn-primary">
                        {{ saving ? 'Saving...' : 'Save Policy' }}
                    </button>
                </div>
                <p class="ps-success" ng-if="successMessage">{{ successMessage }}</p>
                <p class="ps-error" ng-if="errorMessage">{{ errorMessage }}</p>
            </div>

            <hr />

            <div class="ps-tester">
                <h3>Test Password Strength</h3>
                <input type="text" ng-model="testPassword" placeholder="Enter a password to test..." class="ps-input" />
                <button ng-click="validatePassword()" class="btn btn-secondary">Validate</button>
                <div ng-if="validationResult" class="ps-result">
                    <p ng-if="validationResult.valid" class="ps-valid">Password meets all requirements.</p>
                    <ul ng-if="!validationResult.valid" class="ps-errors">
                        <li ng-repeat="err in validationResult.errors" class="ps-error-item">{{ err }}</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .ps-dashboard { padding: 20px; font-family: sans-serif; }
    .ps-form { max-width: 480px; }
    .ps-field { margin-bottom: 14px; }
    .ps-field label { display: block; font-weight: 600; margin-bottom: 4px; }
    .ps-input { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 0.9rem; }
    .ps-actions { margin-top: 16px; }
    .ps-success { color: #065f46; margin-top: 8px; }
    .ps-error { color: #b91c1c; margin-top: 8px; }
    .ps-tester { margin-top: 20px; }
    .ps-tester h3 { font-size: 1rem; margin-bottom: 10px; }
    .ps-result { margin-top: 10px; }
    .ps-valid { color: #065f46; }
    .ps-errors { list-style: disc; padding-left: 1.25rem; color: #b91c1c; }
    .ps-error-item { margin-bottom: 4px; }
</style>

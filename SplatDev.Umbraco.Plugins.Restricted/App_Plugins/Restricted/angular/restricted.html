<div ng-controller="RestrictedDashboardController" class="rc-dashboard">
    <div class="umb-box">
        <div class="umb-box-header">
            <h1>Restricted Content</h1>
            <p>Manage member-only content gates, role-based access and paywall restrictions.</p>
        </div>
        <div class="umb-box-content">
            <p class="rc-success" ng-if="statusMessage">{{ statusMessage }}</p>
            <p class="rc-error" ng-if="errorMessage">{{ errorMessage }}</p>

            <h3>Restrict a Node</h3>
            <div class="rc-form">
                <div class="rc-field">
                    <label>Content Node ID</label>
                    <input type="number" ng-model="nodeId" placeholder="e.g. 1234" class="rc-input" />
                </div>
                <div class="rc-field">
                    <label>Login Page Node ID (Udi or int)</label>
                    <input type="text" ng-model="loginPageNodeId" placeholder="e.g. 1050" class="rc-input" />
                </div>
                <div class="rc-field">
                    <label>Error Page Node ID (Udi or int)</label>
                    <input type="text" ng-model="errorPageNodeId" placeholder="e.g. 1051" class="rc-input" />
                </div>
                <div class="rc-field">
                    <label>Member Groups (comma-separated)</label>
                    <input type="text" ng-model="memberGroups" placeholder="e.g. Members, Premium" class="rc-input" />
                </div>
                <button ng-click="restrictNode()" class="btn btn-primary">Apply Restriction</button>
            </div>

            <hr />

            <h3>Currently Restricted Nodes</h3>
            <div ng-if="loading"><p>Loading...</p></div>
            <div ng-if="!loading">
                <p ng-if="restrictedNodes.length === 0" class="rc-empty">No restricted nodes found.</p>
                <table ng-if="restrictedNodes.length > 0" class="rc-table">
                    <thead>
                        <tr><th>Node ID</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="nodeId in restrictedNodes">
                            <td>{{ nodeId }}</td>
                            <td>
                                <button ng-click="unrestrictNode(nodeId)" class="btn btn-warning btn-xs">Remove Restriction</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .rc-dashboard { padding: 20px; font-family: sans-serif; }
    .rc-form { max-width: 480px; margin-bottom: 20px; }
    .rc-field { margin-bottom: 12px; }
    .rc-field label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.875rem; }
    .rc-input { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 0.9rem; }
    .rc-table { width: 100%; border-collapse: collapse; }
    .rc-table th, .rc-table td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
    .rc-table th { font-weight: 600; background: #f9fafb; }
    .rc-empty { color: #6b7280; }
    .rc-success { color: #065f46; }
    .rc-error { color: #b91c1c; }
</style>

<div class="swf-chart"><div class="swf-chart-track"><div ng-repeat="step in steps" class="swf-chart-step" ng-class="{'swf-chart-step--pending':step.status==='pending','swf-chart-step--active':step.status==='active','swf-chart-step--done':step.status==='done','swf-chart-step--skipped':step.status==='skipped'}"><div class="swf-chart-step-marker"><span ng-if="step.status==='done'">&#10003;</span><span ng-if="step.status!=='done'">{{$index+1}}</span></div><div class="swf-chart-step-label">{{step.label}}</div><div class="swf-chart-step-meta" ng-if="step.assignedTo">{{step.assignedTo}}</div><div class="swf-chart-step-connector" ng-if="!$last"></div></div></div></div>

<div ng-controller="SplatDevWorkflow.ThemesController" class="swf-dashboard"><div class="swf-dashboard-header"><h1>Themes</h1></div><div ng-if="toast" class="swf-toast swf-toast--{{toast.type}}">{{toast.message}}</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px"><div ng-repeat="theme in themes" class="swf-panel"><div class="swf-panel-header"><div><strong>{{theme.name}}</strong><span style="font-weight:400;color:#64748b;margin-left:8px">({{theme.key}})</span></div><button class="swf-btn swf-btn--sm" ng-click="previewTheme(theme)">{{previewKey===theme.key?'Previewing...':'Preview'}}</button></div><div class="swf-panel-body"><div style="font-size:13px;color:#64748b;margin-bottom:12px">{{theme.description}}</div><div data-swf-theme="{{theme.key}}" style="padding:16px;border-radius:8px;border:1px solid #e5e7eb;background:#fafafa"><div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px">Chart Preview</div><div style="display:flex;align-items:center;gap:0"><div style="width:28px;height:28px;border-radius:50%;background:var(--swf-chart-step-done-bg);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px">&#10003;</div><div style="height:var(--swf-chart-connector-thickness);flex:1;background:var(--swf-chart-step-done-bg)"></div><div style="width:28px;height:28px;border-radius:50%;background:var(--swf-chart-step-active-bg);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px">2</div><div style="height:var(--swf-chart-connector-thickness);flex:1;background:var(--swf-chart-step-pending-bg)"></div><div style="width:28px;height:28px;border-radius:50%;background:var(--swf-chart-step-pending-bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8">3</div></div><div style="margin-top:12px;display:flex;gap:6px"><div style="width:16px;height:16px;border-radius:4px;background:var(--swf-chart-step-done-bg)"></div><div style="width:16px;height:16px;border-radius:4px;background:var(--swf-chart-step-active-bg)"></div><div style="width:16px;height:16px;border-radius:4px;background:var(--swf-chart-step-pending-bg)"></div><div style="width:16px;height:16px;border-radius:4px;background:var(--swf-chart-step-skipped-bg)"></div></div></div><div style="margin-top:14px" ng-if="previewKey===theme.key"><div class="swf-section-title">Customize Tokens</div><div ng-repeat="token in theme.tokens" class="swf-form-group"><label>{{token.name}}</label><div style="display:flex;gap:8px;align-items:center"><input type="color" ng-model="token.value" ng-if="token.type==='color'" ng-change="updateToken(theme.key,token)"><input type="text" ng-model="token.value" ng-change="updateToken(theme.key,token)" style="font-size:12px"></div></div></div></div></div></div></div>

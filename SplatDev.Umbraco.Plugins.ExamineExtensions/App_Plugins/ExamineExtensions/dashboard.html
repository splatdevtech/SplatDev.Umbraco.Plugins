<div ng-controller="ExamineExtensionsController as vm" class="umb-dashboard examine-extensions">
  <umb-load-indicator ng-if="vm.loading"></umb-load-indicator>

  <div class="umb-box" ng-if="!vm.loading">
    <div class="umb-box-header">
      <h2>Examine Extensions</h2>
    </div>
    <div class="umb-box-content">

      <div class="row-fluid">
        <div class="span6">
          <h3>Search</h3>
          <div class="control-group">
            <label>Query</label>
            <input type="text" ng-model="vm.query" placeholder="Enter search query..." class="input-xlarge" />
          </div>
          <div class="control-group">
            <label>Index</label>
            <select ng-model="vm.selectedIndex" ng-options="idx for idx in vm.indexes">
            </select>
          </div>
          <div class="control-group">
            <label>Page Size</label>
            <input type="number" ng-model="vm.pageSize" min="1" max="100" class="input-mini" />
          </div>
          <button class="btn btn-primary" ng-click="vm.search()">Search</button>
        </div>

        <div class="span6">
          <h3>Index Management</h3>
          <div class="control-group">
            <label>Index to Rebuild</label>
            <select ng-model="vm.rebuildIndex" ng-options="idx for idx in vm.indexes">
            </select>
          </div>
          <button class="btn btn-warning" ng-click="vm.rebuild()">Rebuild Index</button>
          <span ng-if="vm.rebuildMessage" class="umb-badge umb-badge--success" style="margin-left:10px;">{{vm.rebuildMessage}}</span>
        </div>
      </div>

      <div class="row-fluid" ng-if="vm.results">
        <hr />
        <h3>Results <small>({{vm.results.totalItems}} total)</small></h3>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Score</th>
              <th>Fields</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="item in vm.results.items">
              <td>{{item.id}}</td>
              <td>{{item.score | number:4}}</td>
              <td>
                <span ng-repeat="(k,v) in item.fields"><strong>{{k}}</strong>: {{v}}<br /></span>
              </td>
            </tr>
          </tbody>
        </table>
        <div ng-if="vm.results.items.length === 0" class="alert alert-info">No results found.</div>
      </div>

    </div>
  </div>
</div>

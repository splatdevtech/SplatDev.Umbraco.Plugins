<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Export</title>
    <style>
        :host {
            display: block;
            padding: 20px;
        }

        .export-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #1b264f;
        }

        .header p {
            color: #666;
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1b264f;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0f1a3e;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e8e8e8;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 6px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #1b264f;
        }

        .preview-section {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 6px;
            padding: 20px;
        }

        .preview-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 15px 0;
            color: #1b264f;
        }

        .yaml-preview {
            background: #f8f8f8;
            border: 1px solid #e3e3e3;
            border-radius: 4px;
            padding: 15px;
            max-height: 500px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .message-info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }

        .message-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .message-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="export-container">
        <div class="header">
            <h1>Schema Export</h1>
            <p>Export your Umbraco site structure to YAML format for version control and migration</p>
        </div>

        <div id="message" class="hidden"></div>

        <div class="actions">
            <button id="exportBtn" class="btn btn-primary" onclick="exportYaml()">
                <span id="exportSpinner" class="spinner hidden"></span>
                <span id="exportText">Export to YAML</span>
            </button>
            <button id="downloadYamlBtn" class="btn btn-secondary" onclick="downloadYaml()" disabled>
                Download YAML
            </button>
            <button id="downloadZipBtn" class="btn btn-secondary" onclick="downloadZip()">
                Download ZIP (with media)
            </button>
        </div>

        <div id="statsSection" class="stats-grid hidden">
            <!-- Stats will be populated here -->
        </div>

        <div id="previewSection" class="preview-section hidden">
            <h2>Generated YAML Preview</h2>
            <div id="yamlPreview" class="yaml-preview"></div>
        </div>
    </div>

    <script>
        let exportedYaml = null;

        async function exportYaml() {
            const btn = document.getElementById('exportBtn');
            const spinner = document.getElementById('exportSpinner');
            const text = document.getElementById('exportText');
            const downloadBtn = document.getElementById('downloadYamlBtn');

            // Show loading state
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.textContent = 'Exporting...';
            hideMessage();

            try {
                const response = await fetch('/umbraco/api/schemaexport/export');

                if (!response.ok) {
                    throw new Error(`Export failed: ${response.statusText}`);
                }

                const data = await response.json();
                exportedYaml = data.yaml;

                // Show statistics
                displayStatistics(data.statistics);

                // Show YAML preview (first 10000 chars)
                displayYamlPreview(data.yaml);

                // Enable download button
                downloadBtn.disabled = false;

                showMessage('Export completed successfully!', 'success');
            } catch (error) {
                console.error('Export error:', error);
                showMessage(`Export failed: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.textContent = 'Export to YAML';
            }
        }

        function displayStatistics(stats) {
            const section = document.getElementById('statsSection');
            section.classList.remove('hidden');

            section.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Umbraco Version</div>
                    <div class="stat-value">${stats.umbracoVersion}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Data Types</div>
                    <div class="stat-value">${stats.dataTypes}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Document Types</div>
                    <div class="stat-value">${stats.documentTypes}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Media Types</div>
                    <div class="stat-value">${stats.mediaTypes}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Templates</div>
                    <div class="stat-value">${stats.templates}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Content Nodes</div>
                    <div class="stat-value">${stats.content}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Media Items</div>
                    <div class="stat-value">${stats.media}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Languages</div>
                    <div class="stat-value">${stats.languages}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Dictionary Items</div>
                    <div class="stat-value">${stats.dictionaryItems}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Members</div>
                    <div class="stat-value">${stats.members}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Users</div>
                    <div class="stat-value">${stats.users}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value">${stats.durationSeconds.toFixed(2)}s</div>
                </div>
            `;
        }

        function displayYamlPreview(yaml) {
            const section = document.getElementById('previewSection');
            const preview = document.getElementById('yamlPreview');

            section.classList.remove('hidden');

            // Show first 10000 characters
            const previewText = yaml.length > 10000 
                ? yaml.substring(0, 10000) + '\n\n... (truncated, download full file to see complete YAML)'
                : yaml;

            preview.textContent = previewText;
        }

        async function downloadYaml() {
            if (!exportedYaml) {
                showMessage('Please export YAML first', 'info');
                return;
            }

            try {
                const response = await fetch('/umbraco/api/schemaexport/downloadyaml');

                if (!response.ok) {
                    throw new Error(`Download failed: ${response.statusText}`);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `umbraco-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.yaml`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showMessage('YAML file downloaded successfully', 'success');
            } catch (error) {
                console.error('Download error:', error);
                showMessage(`Download failed: ${error.message}`, 'error');
            }
        }

        async function downloadZip() {
            const btn = document.getElementById('downloadZipBtn');
            btn.disabled = true;
            btn.textContent = 'Creating ZIP...';

            try {
                const response = await fetch('/umbraco/api/schemaexport/downloadzip');

                if (!response.ok) {
                    throw new Error(`ZIP creation failed: ${response.statusText}`);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `umbraco-export-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.zip`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showMessage('ZIP file downloaded successfully', 'success');
            } catch (error) {
                console.error('ZIP error:', error);
                showMessage(`ZIP creation failed: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Download ZIP (with media)';
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message message-${type}`;
            message.classList.remove('hidden');
        }

        function hideMessage() {
            const message = document.getElementById('message');
            message.classList.add('hidden');
        }
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1724"/>
      <stop offset="60%" style="stop-color:#1B2A3B"/>
      <stop offset="100%" style="stop-color:#0F2032"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3048"/>
      <stop offset="100%" style="stop-color:#162538"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF8E53"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04">
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#4ECDC4" stroke-width="1"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="#4ECDC4" stroke-width="1"/>
  </g>

  <!-- Left YAML card -->
  <rect x="60" y="100" width="440" height="430" rx="12" fill="url(#cardBg)" stroke="#2A4060" stroke-width="1"/>
  <!-- Card header bar -->
  <rect x="60" y="100" width="440" height="44" rx="12" fill="#162538"/>
  <rect x="60" y="130" width="440" height="14" fill="#162538"/>
  <!-- Traffic light dots -->
  <circle cx="90" cy="122" r="7" fill="#FF5F57"/>
  <circle cx="112" cy="122" r="7" fill="#FEBC2E"/>
  <circle cx="134" cy="122" r="7" fill="#28C840"/>
  <!-- File tab -->
  <rect x="158" y="112" width="120" height="20" rx="4" fill="#1E3048"/>
  <text x="218" y="126" font-family="monospace" font-size="11" fill="#7EC8C8" text-anchor="middle">umbraco.yaml</text>

  <!-- YAML code content -->
  <g font-family="monospace" font-size="13">
    <!-- dataTypes: -->
    <text x="88" y="172" fill="#4ECDC4">dataTypes:</text>
    <text x="100" y="193" fill="#B0C4DE">  - </text><text x="122" y="193" fill="#FF6B6B">alias</text><text x="155" y="193" fill="#B0C4DE">: </text><text x="168" y="193" fill="#A8D8A8">textString</text>
    <text x="100" y="212" fill="#B0C4DE">    </text><text x="122" y="212" fill="#FF6B6B">name</text><text x="155" y="212" fill="#B0C4DE">: </text><text x="168" y="212" fill="#FFF">Text String</text>
    <text x="100" y="231" fill="#B0C4DE">    </text><text x="122" y="231" fill="#FF6B6B">editorUiAlias</text><text x="238" y="231" fill="#B0C4DE">: </text><text x="251" y="231" fill="#FFD700" opacity="0.9">Umbraco.TextBox</text>

    <!-- documentTypes: -->
    <text x="88" y="262" fill="#4ECDC4">documentTypes:</text>
    <text x="100" y="283" fill="#B0C4DE">  - </text><text x="122" y="283" fill="#FF6B6B">alias</text><text x="155" y="283" fill="#B0C4DE">: </text><text x="168" y="283" fill="#A8D8A8">page</text>
    <text x="100" y="302" fill="#B0C4DE">    </text><text x="122" y="302" fill="#FF6B6B">allowAsRoot</text><text x="211" y="302" fill="#B0C4DE">: </text><text x="224" y="302" fill="#FF8E8E">true</text>
    <text x="100" y="321" fill="#B0C4DE">    </text><text x="122" y="321" fill="#FF6B6B">tabs</text><text x="152" y="321" fill="#B0C4DE">:</text>
    <text x="100" y="340" fill="#B0C4DE">      - </text><text x="137" y="340" fill="#FF6B6B">name</text><text x="168" y="340" fill="#B0C4DE">: </text><text x="181" y="340" fill="#FFF">Content</text>

    <!-- content: -->
    <text x="88" y="371" fill="#4ECDC4">content:</text>
    <text x="100" y="392" fill="#B0C4DE">  - </text><text x="122" y="392" fill="#FF6B6B">name</text><text x="152" y="392" fill="#B0C4DE">: </text><text x="165" y="392" fill="#FFF">Home</text>
    <text x="100" y="411" fill="#B0C4DE">    </text><text x="122" y="411" fill="#FF6B6B">documentType</text><text x="232" y="411" fill="#B0C4DE">: </text><text x="245" y="411" fill="#A8D8A8">page</text>
    <text x="100" y="430" fill="#B0C4DE">    </text><text x="122" y="430" fill="#FF6B6B">isPublished</text><text x="211" y="430" fill="#B0C4DE">: </text><text x="224" y="430" fill="#FF8E8E">true</text>
    <text x="100" y="449" fill="#B0C4DE">    </text><text x="122" y="449" fill="#FF6B6B">properties</text><text x="208" y="449" fill="#B0C4DE">:</text>
    <text x="100" y="468" fill="#B0C4DE">      </text><text x="137" y="468" fill="#FF6B6B">title</text><text x="168" y="468" fill="#B0C4DE">: </text><text x="181" y="468" fill="#E8E8A8">"Welcome Home"</text>
    <text x="100" y="487" fill="#B0C4DE">      </text><text x="137" y="487" fill="#FF6B6B">children</text><text x="192" y="487" fill="#B0C4DE">: [...]</text>
  </g>

  <!-- Center arrow -->
  <g filter="url(#glow)">
    <path d="M528 315 L672 315" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M658 300 L676 315 L658 330" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small label -->
    <text x="600" y="305" font-family="sans-serif" font-size="11" fill="#FF8E53" text-anchor="middle" opacity="0.8">startup</text>
  </g>

  <!-- Right: Umbraco structure card -->
  <rect x="700" y="100" width="440" height="430" rx="12" fill="url(#cardBg)" stroke="#2A4060" stroke-width="1"/>
  <rect x="700" y="100" width="440" height="44" rx="12" fill="#162538"/>
  <rect x="700" y="130" width="440" height="14" fill="#162538"/>
  <circle cx="730" cy="122" r="7" fill="#FF5F57"/>
  <circle cx="752" cy="122" r="7" fill="#FEBC2E"/>
  <circle cx="774" cy="122" r="7" fill="#28C840"/>
  <rect x="798" y="112" width="140" height="20" rx="4" fill="#1E3048"/>
  <text x="868" y="126" font-family="monospace" font-size="11" fill="#7EC8C8" text-anchor="middle">Umbraco Back-office</text>

  <!-- Content tree -->
  <g font-family="sans-serif" font-size="13">
    <!-- DataTypes section -->
    <text x="728" y="172" fill="#4ECDC4" font-size="11" font-weight="bold" letter-spacing="1">DATA TYPES</text>
    <!-- DataType rows -->
    <rect x="728" y="180" width="16" height="16" rx="3" fill="#FF6B6B" opacity="0.8"/>
    <text x="752" y="193" fill="#E0E8F0">Text String</text>
    <rect x="728" y="202" width="16" height="16" rx="3" fill="#FF6B6B" opacity="0.8"/>
    <text x="752" y="215" fill="#E0E8F0">Body Content</text>

    <!-- DocumentTypes section -->
    <text x="728" y="246" fill="#4ECDC4" font-size="11" font-weight="bold" letter-spacing="1">DOCUMENT TYPES</text>
    <rect x="728" y="254" width="16" height="16" rx="3" fill="#FFD700" opacity="0.7"/>
    <text x="752" y="267" fill="#E0E8F0">Page</text>
    <rect x="728" y="276" width="16" height="16" rx="3" fill="#FFD700" opacity="0.7"/>
    <text x="752" y="289" fill="#E0E8F0">Article</text>

    <!-- Content tree section -->
    <text x="728" y="320" fill="#4ECDC4" font-size="11" font-weight="bold" letter-spacing="1">CONTENT</text>
    <!-- Root node -->
    <circle cx="740" cy="338" r="8" fill="#4ECDC4"/>
    <text x="756" y="342" fill="#E0E8F0">Home</text>
    <circle cx="756" cy="346" r="2" fill="#4ECDC4" opacity="0.3"/>
    <!-- Level 1 nodes with connectors -->
    <line x1="740" y1="346" x2="740" y2="388" stroke="#2A4060" stroke-width="1.5"/>
    <line x1="740" y1="364" x2="756" y2="364" stroke="#2A4060" stroke-width="1.5"/>
    <circle cx="764" cy="364" r="7" fill="#7EC8C8"/>
    <text x="779" y="368" fill="#C0D4E8">About Us</text>
    <line x1="740" y1="388" x2="756" y2="388" stroke="#2A4060" stroke-width="1.5"/>
    <circle cx="764" cy="388" r="7" fill="#7EC8C8"/>
    <text x="779" y="392" fill="#C0D4E8">Blog</text>
    <!-- Level 2 nodes -->
    <line x1="764" y1="395" x2="764" y2="430" stroke="#2A4060" stroke-width="1.5"/>
    <line x1="764" y1="412" x2="780" y2="412" stroke="#2A4060" stroke-width="1.5"/>
    <circle cx="787" cy="412" r="6" fill="#A8D8C8" opacity="0.8"/>
    <text x="801" y="416" fill="#9BBBD4" font-size="12">First Post</text>
    <line x1="764" y1="430" x2="780" y2="430" stroke="#2A4060" stroke-width="1.5"/>
    <circle cx="787" cy="430" r="6" fill="#A8D8C8" opacity="0.8"/>
    <text x="801" y="434" fill="#9BBBD4" font-size="12">Second Post</text>

    <!-- Templates section -->
    <text x="728" y="470" fill="#4ECDC4" font-size="11" font-weight="bold" letter-spacing="1">TEMPLATES</text>
    <rect x="728" y="478" width="16" height="16" rx="3" fill="#A8D8A8" opacity="0.7"/>
    <text x="752" y="491" fill="#E0E8F0">Page.cshtml</text>
    <rect x="728" y="500" width="16" height="16" rx="3" fill="#A8D8A8" opacity="0.7"/>
    <text x="752" y="513" fill="#E0E8F0">Article.cshtml</text>
  </g>

  <!-- Bottom title section -->
  <text x="600" y="570" font-family="sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#4ECDC4">YAML</tspan>
    <tspan fill="#6A8BA4"> → </tspan>
    <tspan fill="#FFFFFF">Umbraco Schema</tspan>
  </text>
  <text x="600" y="603" font-family="sans-serif" font-size="15" fill="#6A8BA4" text-anchor="middle">SplatDev.Umbraco.Plugins.Yaml2Schema · Infrastructure-as-Code for Umbraco 17</text>
</svg>

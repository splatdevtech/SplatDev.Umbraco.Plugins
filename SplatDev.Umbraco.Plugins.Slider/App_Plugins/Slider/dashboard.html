<div ng-controller="Slider.DashboardController as vm">
  <umb-load-indicator ng-if="vm.loading"></umb-load-indicator>

  <div class="umb-dashboard-header">
    <h1>Slider Manager</h1>
  </div>

  <div class="umb-box" ng-repeat="slider in vm.sliders">
    <div class="umb-box-header">
      <h2>{{slider.name}}</h2>
      <small>Effect: {{slider.effect}} | Autoplay: {{slider.autoplay ? 'Yes' : 'No'}} ({{slider.autoplayDelay}}ms)</small>
    </div>
    <div class="umb-box-content">
      <ul>
        <li ng-repeat="slide in slider.slides | orderBy:'sortOrder'">
          <strong>{{slide.title}}</strong>
          <span ng-if="slide.subtitle"> - {{slide.subtitle}}</span>
        </li>
      </ul>
    </div>
  </div>
</div>
